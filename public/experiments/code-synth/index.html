<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>codesynth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app" id="app">
    <header class="header">
      <div class="title">code<span class="title-dim">synth</span></div>
      <div class="header-controls">
        <div class="toggle-group" id="repr-toggle">
          <button class="tog active" id="mode-code">code</button>
          <button class="tog" id="mode-ui">ui</button>
        </div>
        <div class="toggle-group" id="view-toggle">
          <button class="tog active" id="view-pattern">pattern</button>
          <button class="tog" id="view-song">song</button>
        </div>
        <button id="play-btn" class="play-btn">play</button>
        <span class="bpm-display" id="bpm-display">128 bpm</span>
      </div>
    </header>

    <main class="main" id="main">

      <!-- ── PATTERN UI: sequencer (left) ── -->
      <div class="panel" id="panel-seq">
        <div class="seq-header">
          <div class="panel-label">pattern</div>
          <div class="bpm-control">
            <span class="bpm-label">bpm</span>
            <button class="bpm-btn" id="bpm-down">−</button>
            <span id="bpm-value">128</span>
            <button class="bpm-btn" id="bpm-up">+</button>
          </div>
        </div>
        <div class="seq-tracks" id="seq-tracks"></div>
        <div class="add-track-row">
          <select id="inst-select">
            <optgroup label="drums">
              <option value="kick">kick</option>
              <option value="snare">snare</option>
              <option value="clap">clap</option>
              <option value="hat">hat</option>
              <option value="openhat">openhat</option>
              <option value="rim">rim</option>
            </optgroup>
            <optgroup label="melodic">
              <option value="synth">synth</option>
              <option value="bass">bass</option>
              <option value="pad">pad</option>
            </optgroup>
          </select>
          <input id="note-input" type="text" placeholder="c4" maxlength="3" class="note-input">
          <button id="add-track-btn" class="add-btn">+ add track</button>
        </div>
      </div>

      <!-- ── PATTERN CODE: editor (center/left) ── -->
      <div class="panel" id="panel-code">
        <div class="panel-label">code</div>
        <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      </div>

      <!-- ── PATTERN CODE: viz + reference (right) ── -->
      <div class="panel" id="panel-viz">
        <div class="panel-label">pattern</div>
        <div id="viz" class="viz"></div>
        <div class="ref-panel">
          <div class="panel-label" style="margin-top:1rem">reference</div>
          <div class="ref-grid">
            <div class="ref-section">
              <div class="ref-title">drums</div>
              <div class="ref-item"><code>kick</code><span>808 kick</span></div>
              <div class="ref-item"><code>snare</code><span>snare</span></div>
              <div class="ref-item"><code>clap</code><span>hand clap</span></div>
              <div class="ref-item"><code>hat</code><span>hi-hat</span></div>
              <div class="ref-item"><code>openhat</code><span>open hat</span></div>
              <div class="ref-item"><code>rim</code><span>rimshot</span></div>
            </div>
            <div class="ref-section">
              <div class="ref-title">melodic</div>
              <div class="ref-item"><code>synth c4</code><span>saw</span></div>
              <div class="ref-item"><code>bass c2</code><span>sub</span></div>
              <div class="ref-item"><code>pad e3</code><span>pad</span></div>
              <div class="ref-title" style="margin-top:.75rem">song</div>
              <div class="ref-item"><code>@scene A</code></div>
              <div class="ref-item"><code>@song A×2 B×4</code></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── SONG CODE: full editor ── -->
      <div class="panel" id="panel-song-code">
        <div class="panel-label">song code</div>
        <textarea id="song-editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      </div>

      <!-- ── SONG UI: scenes + arrangement ── -->
      <div class="panel" id="panel-song-ui">
        <div class="song-col scenes-col">
          <div class="col-header">
            <div class="panel-label">scenes</div>
          </div>
          <div class="scene-cards-list" id="scene-cards"></div>
        </div>
        <div class="song-col arr-col">
          <div class="col-header">
            <div class="panel-label">arrangement</div>
            <span class="arr-total" id="arr-total"></span>
          </div>
          <div class="song-arr-list" id="song-arr-list"></div>
        </div>
      </div>

    </main>

    <!-- ── Scene strip: pattern modes only ── -->
    <div class="scene-strip" id="scene-strip">
      <span class="strip-label">scenes</span>
      <div class="scenes-list" id="scenes-list"></div>
      <button class="new-scene-btn" id="new-scene-btn" title="Save current pattern as a new scene">+</button>
    </div>

    <div class="status-bar" id="status-bar">
      <span id="status-text">ready &mdash; press play or hit space</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
