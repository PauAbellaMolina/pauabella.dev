<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>codesynth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app" id="app">

    <header class="header">
      <div class="title">code<span class="title-dim">synth</span></div>
      <div class="header-controls">
        <div class="toggle-group" id="repr-toggle">
          <button class="tog active" id="mode-ui">ui</button>
          <button class="tog" id="mode-code">code</button>
        </div>
        <button id="play-btn" class="play-btn">play</button>
        <span class="bpm-display" id="bpm-display">128 bpm</span>
        <button id="clean-btn" class="clean-btn">reset</button>
      </div>
    </header>

    <main class="main" id="main">

      <!-- Song UI panel: scenes + arrangement (big in ui mode, narrow in code mode) -->
      <div id="panel-song-ui">
        <div class="song-col scenes-col">
          <div class="col-header">
            <div class="panel-label">scenes</div>
            <button class="new-scene-btn" id="new-scene-btn">+ new</button>
          </div>
          <div class="scene-cards-list" id="scene-cards"></div>
        </div>
        <div class="song-col arr-col">
          <div class="col-header">
            <div class="panel-label">arrangement</div>
            <span class="arr-total" id="arr-total"></span>
          </div>
          <div class="song-arr-list" id="song-arr-list"></div>
        </div>
      </div>

      <!-- Song code panel (small side in ui mode, big in code mode) -->
      <div id="panel-song-code" class="panel">
        <div class="panel-label">song code</div>
        <textarea id="song-editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      </div>

    </main>

    <!-- Pattern editor overlay -->
    <div id="pattern-editor" class="pattern-editor">
      <div class="pe-header">
        <div class="pe-title">scene <span id="pe-scene-name">A</span></div>
        <div class="pe-controls">
          <div class="toggle-group">
            <button class="tog active" id="pe-mode-ui">ui</button>
            <button class="tog" id="pe-mode-code">code</button>
          </div>
          <button id="pe-preview-btn" class="pe-btn">preview: off</button>
          <button id="pe-cancel-btn" class="pe-btn">cancel</button>
          <button id="pe-save-btn" class="pe-btn primary">save</button>
        </div>
      </div>
      <div class="pe-main">

        <!-- Code editor (big in code mode, small side in ui mode) -->
        <div id="pe-panel-code" class="panel">
          <div class="panel-label">code</div>
          <textarea id="pe-editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
        </div>

        <!-- Viz + reference (right side in code mode, hidden in ui mode) -->
        <div id="pe-panel-viz" class="panel">
          <div class="panel-label">pattern</div>
          <div id="pe-viz" class="viz"></div>
          <div class="ref-panel">
            <div class="panel-label" style="margin-top:1rem">reference</div>
            <div class="ref-grid">
              <div class="ref-section">
                <div class="ref-title">drums</div>
                <div class="ref-item"><code>kick</code><span>808 kick</span></div>
                <div class="ref-item"><code>snare</code><span>snare</span></div>
                <div class="ref-item"><code>clap</code><span>hand clap</span></div>
                <div class="ref-item"><code>hat</code><span>hi-hat</span></div>
                <div class="ref-item"><code>openhat</code><span>open hat</span></div>
                <div class="ref-item"><code>rim</code><span>rimshot</span></div>
              </div>
              <div class="ref-section">
                <div class="ref-title">melodic</div>
                <div class="ref-item"><code>synth c4</code><span>saw</span></div>
                <div class="ref-item"><code>bass c2</code><span>sub</span></div>
                <div class="ref-item"><code>pad e3</code><span>pad</span></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Sequencer (big in ui mode, hidden in code mode) -->
        <div id="pe-panel-seq" class="panel">
          <div class="seq-header">
            <div class="panel-label">pattern</div>
            <div class="bpm-control">
              <span class="bpm-label">bpm</span>
              <button class="bpm-btn" id="pe-bpm-down">−</button>
              <span id="pe-bpm-value">128</span>
              <button class="bpm-btn" id="pe-bpm-up">+</button>
            </div>
          </div>
          <div class="seq-tracks" id="pe-seq-tracks"></div>
          <div class="add-track-row">
            <select id="pe-inst-select">
              <optgroup label="drums">
                <option value="kick">kick</option>
                <option value="snare">snare</option>
                <option value="clap">clap</option>
                <option value="hat">hat</option>
                <option value="openhat">openhat</option>
                <option value="rim">rim</option>
              </optgroup>
              <optgroup label="melodic">
                <option value="synth">synth</option>
                <option value="bass">bass</option>
                <option value="pad">pad</option>
              </optgroup>
            </select>
            <input id="pe-note-input" type="text" placeholder="c4" maxlength="3" class="note-input">
            <button id="pe-add-track-btn" class="add-btn">+ add track</button>
          </div>
        </div>

      </div>
    </div>

    <div class="status-bar" id="status-bar">
      <span id="status-text">ready &mdash; press play or hit space</span>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
