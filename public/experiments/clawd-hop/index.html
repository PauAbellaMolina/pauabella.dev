<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>clawd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Start Screen -->
  <div id="start" class="screen active">
    <h1>clawd</h1>
    <p>Jump between platforms — but only your color holds you up.</p>
    <div class="controls-hint">
      <div><kbd>Mouse</kbd> move</div>
      <div><kbd>Click</kbd> jump</div>
      <div><kbd>Q</kbd><kbd>W</kbd><kbd>E</kbd> color</div>
      <div><kbd>Space</kbd> slow</div>
    </div>
    <button id="btn-start">Play</button>
  </div>

  <!-- Game Canvas -->
  <canvas id="game"></canvas>

  <!-- Bottom Legend (outside canvas) -->
  <div id="legend">
    <div id="slow-bar-track">
      <div id="slow-bar-fill"></div>
      <div id="slow-dots"></div>
    </div>
    <div id="legend-keys">
      <button class="legend-key" id="lk-0"><span class="lk-label">Q</span></button>
      <button class="legend-key" id="lk-1"><span class="lk-label">W</span></button>
      <button class="legend-key" id="lk-2"><span class="lk-label">E</span></button>
    </div>
  </div>

  <!-- Touch Controls -->
  <div id="touch">
    <div class="tc-row tc-top">
      <button class="tc-btn tc-color" id="t-c0"></button>
      <button class="tc-btn tc-color" id="t-c1"></button>
      <button class="tc-btn tc-color" id="t-c2"></button>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="gameover" class="screen">
    <h1 id="final-score">0</h1>
    <p class="subtitle">meters climbed</p>
    <button id="btn-restart">Again</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
